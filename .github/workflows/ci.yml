name: CI
on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Langkah ini untuk kita semak struktur folder sebenar
      - name: Lihat struktur folder
        run: ls -la
          
      # Tukar laluan kepada "." (root/luar sekali) untuk cuba jika ia sebenarnya di luar
      - name: Install dependencies
        run: npm install
        working-directory: .
        
      # Tukar laluan kepada "." juga
      - name: Run Vitest
        run: npm test
        working-directory: .
