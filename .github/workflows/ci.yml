name: CI
on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # Menggunakan Node.js 22 yang pasti menyokong Vitest versi terbaru
          
      - name: Install dependencies
        run: npm install
        
      - name: Run Vitest
        run: npm test