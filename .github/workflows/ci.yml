name: CI
on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      # Langkah install di dalam sub-folder
      - name: Install dependencies
        run: npm install
        working-directory: ./sistem-maklumat-pelajar-kakitangan
        
      # Langkah run test di dalam sub-folder
      - name: Run Vitest
        run: npm test
        working-directory: ./sistem-maklumat-pelajar-kakitangan
